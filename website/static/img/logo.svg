<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005494;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded rectangle background -->
  <rect x="4" y="4" width="112" height="112" rx="20" ry="20" fill="url(#bg)" />
  <!-- "C" letter -->
  <text x="32" y="82" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="64" fill="#ffffff">C</text>
  <!-- First "+" vertical -->
  <rect x="82" y="38" width="8" height="32" rx="2" fill="#ffffff" />
  <!-- First "+" horizontal -->
  <rect x="74" y="50" width="24" height="8" rx="2" fill="#ffffff" />
  <!-- Second "+" vertical -->
  <rect x="102" y="38" width="8" height="32" rx="2" fill="#ffffff" />
  <!-- Second "+" horizontal -->
  <rect x="94" y="50" width="24" height="8" rx="2" fill="#ffffff" />
</svg>
